<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebAI 01</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <h1>WebAI no Chrome</h1>
      <p class="muted">Clique para gerar resposta com a API experimental de IA do Chrome.</p>

      <div class="controls">
        <label for="inputLanguage">Idioma de entrada:</label>
        <select id="inputLanguage" name="inputLanguage">
          <option value="pt" selected>pt</option>
          <option value="en">en</option>
          <option value="es">es</option>
          <option value="ja">ja</option>
        </select>
      </div>

      <label for="promptText"><strong>Pergunta / Prompt</strong></label>
      <textarea id="promptText" name="promptText">Quem inventou o JavaScript?</textarea>

      <button id="startBtn" type="button">Iniciar</button>
      <section id="output" aria-live="polite">Aguardando clique...</section>

      <section id="diagnostics" aria-live="polite">
        <h2>Diagnostico</h2>
        <pre id="diagOutput">Aguardando verificacao...</pre>
        <button id="diagBtn" type="button">Atualizar diagnostico</button>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/markdown@0.5.0/lib/markdown.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
