name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modulo01-fundamentos-de-ia-e-llms-para-programadores/exemplo-06-playwright-testes

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: modulo01-fundamentos-de-ia-e-llms-para-programadores/exemplo-06-playwright-testes/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npm test

      - name: Upload HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: modulo01-fundamentos-de-ia-e-llms-para-programadores/exemplo-06-playwright-testes/playwright-report/
          retention-days: 7
